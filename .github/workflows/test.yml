name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  swift-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer
      - name: swift test
        run: swift test
